<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EVP - בחירת משחק</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Assistant", "Heebo", sans-serif;
        background: #ff3344;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      #openScreen {
        position: fixed;
        inset: 0;
        background: #ff3344;
        display: grid;
        place-items: center;
        z-index: 1000;
        opacity: 1;
        transition: opacity 0.42s ease;
      }

      #openScreen.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #openScreen .open-logo {
        display: block;
        width: min(92vw, 760px);
        max-height: 88vh;
        height: auto;
        object-fit: contain;
        user-select: none;
        -webkit-user-drag: none;
      }

      #openScreen #tailGif {
        position: absolute;
        left: 0;
        bottom: max(8px, env(safe-area-inset-bottom));
        width: clamp(238px, 49vw, 459px);
        height: auto;
        z-index: 2;
        pointer-events: none;
        user-select: none;
        -webkit-user-drag: none;
      }

      .games {
        width: min(92vw, 560px);
        display: grid;
        gap: 12px;
      }

      .game-btn {
        border: 0;
        border-radius: 14px;
        padding: 14px 16px;
        color: #fff;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        text-align: right;
      }

      .game-btn:hover {
        filter: brightness(1.06);
      }

      .game-btn.puzzle {
        background: linear-gradient(120deg, #0f766e, #14b8a6);
      }

      .game-btn.coins {
        background: linear-gradient(120deg, #b45309, #f59e0b);
      }

      .game-btn.waldo {
        background: linear-gradient(120deg, #be123c, #f43f5e);
      }
    </style>
  </head>
  <body>
    <div id="openScreen" aria-label="מסך פתיחה">
      <img class="open-logo" src="LOGO.svg" alt="פתיחה" />
      <img id="tailGif" src="tail2.gif" alt="" aria-hidden="true" />
    </div>

    <main class="games" aria-label="בחירת משחק">
      <button class="game-btn puzzle" onclick="location.href='3x3puzzle.html'">פאזל 3x3</button>
      <button class="game-btn coins" onclick="location.href='coins.html'">חפש את ההבדלים</button>
      <button class="game-btn waldo" onclick="location.href='gameWALD.html'">Waldo Hunt</button>
    </main>

    <script>
      (() => {
        const openScreen = document.getElementById("openScreen");
        if (!openScreen) return;

        const params = new URLSearchParams(window.location.search || "");
        if (params.get("home") === "1") {
          openScreen.remove();
          return;
        }

        const OPEN_SCREEN_MS = 6000;
        let closed = false;

        function closeOpenScreen() {
          if (closed) return;
          closed = true;
          openScreen.classList.add("fade-out");
          setTimeout(() => {
            openScreen.remove();
          }, 420);
        }

        const timer = setTimeout(closeOpenScreen, OPEN_SCREEN_MS);

        function closeNow() {
          clearTimeout(timer);
          closeOpenScreen();
        }

        openScreen.addEventListener("click", closeNow, { once: true });
        openScreen.addEventListener("touchend", closeNow, { once: true });
      })();
    </script>
  </body>
</html>
